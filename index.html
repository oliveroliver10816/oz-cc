<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Ozem+ · Command Center</title>
<style>
:root{--bg:#0f1517;--card:#161f22;--card2:#111a1d;--line:#243238;--tx:#e8eef0;--dim:#8fa3a9;--faint:#5f7278;--accent:#2ec7a6;--gold:#e8b84b;--green:#3ddc97;--amber:#f0b429;--red:#f0736a}
*{box-sizing:border-box}html,body{margin:0}body{background:var(--bg);color:var(--tx);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:1080px;margin:0 auto;padding:22px 18px 60px}
.top{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:18px}
h1{font-size:20px;margin:0;font-weight:700;letter-spacing:.2px}h1 .b{background:var(--accent);color:#052b23;border-radius:6px;padding:1px 7px;margin-right:7px;font-size:16px}
.meta{color:var(--faint);font-size:12.5px}.dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;box-shadow:0 0 0 0 rgba(61,220,151,.6);animation:p 2.4s infinite}
@keyframes p{0%{box-shadow:0 0 0 0 rgba(61,220,151,.5)}70%{box-shadow:0 0 0 7px rgba(61,220,151,0)}100%{box-shadow:0 0 0 0 rgba(61,220,151,0)}}
.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:8px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.kpi .l{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.kpi .v{font-size:27px;font-weight:700;margin-top:3px;letter-spacing:-.5px}
.kpi .s{color:var(--faint);font-size:12px;margin-top:1px}
.kpi.rev .v{color:var(--gold)}.kpi.sale .v{color:var(--green)}
h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin:26px 0 10px;font-weight:700}
.geos{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.geo{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
.geo .h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.geo .h .n{font-weight:700;font-size:15px}.geo .h .n .fl{font-size:18px;margin-right:6px}
.geo .h .rv{color:var(--gold);font-weight:700;font-size:14px}
.mini{display:flex;gap:14px;margin:2px 0 12px;flex-wrap:wrap}
.mini div{font-size:12px;color:var(--dim)}.mini b{display:block;color:var(--tx);font-size:16px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:6px 6px;border-bottom:1px solid var(--card2)}
th{color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
td.q{color:var(--tx);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.num{text-align:right;color:var(--dim);font-variant-numeric:tabular-nums}
.pos{display:inline-block;min-width:30px;text-align:center;border-radius:5px;padding:1px 6px;font-weight:700;font-size:12px}
.p1{background:rgba(61,220,151,.16);color:var(--green)}.p2{background:rgba(46,199,166,.14);color:var(--accent)}.p3{background:rgba(240,180,41,.14);color:var(--amber)}.p4{background:rgba(255,255,255,.06);color:var(--dim)}
.sales table td{border-bottom:1px solid var(--card2)}.usd{color:var(--gold);font-weight:700}
.empty{color:var(--faint);font-size:13px;padding:8px 2px}
.foot{color:var(--faint);font-size:12px;margin-top:26px;border-top:1px solid var(--line);padding-top:12px}
#app{opacity:0;transition:opacity .45s ease}#app.on{opacity:1}
.gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9}
.gate .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 26px;width:min(340px,90vw);text-align:center}
.gate h3{margin:0 0 4px;font-size:16px}.gate p{color:var(--dim);font-size:13px;margin:0 0 14px}
.gate input{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:9px;color:var(--tx);padding:11px 12px;font-size:15px;text-align:center;letter-spacing:1px}
.gate input:focus{outline:none;border-color:var(--accent)}
.gate button{margin-top:11px;width:100%;background:var(--accent);color:#052b23;border:0;border-radius:9px;padding:11px;font-weight:700;font-size:14px;cursor:pointer}
.gate .err{color:var(--red);font-size:12.5px;height:14px}
.sk{background:linear-gradient(90deg,#182226 25%,#202d31 37%,#182226 63%);background-size:400% 100%;animation:sh 1.3s ease infinite;border-radius:8px}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
</style></head><body>
<div class="gate" id="gate"><div class="card">
  <h3>Ozem+ Command Center</h3><p>Enter passcode to view</p>
  <input id="pc" type="password" autocomplete="off" placeholder="passcode" autofocus>
  <div class="err" id="er"></div>
  <button id="go">Unlock</button>
</div></div>
<div class="wrap"><div id="app"></div></div>

function deob(b64,key){var bin=atob(b64),n=bin.length,a=new Uint8Array(n),k=[];for(var i=0;i<key.length;i++)k.push(key.charCodeAt(i));for(i=0;i<n;i++)a[i]=bin.charCodeAt(i)^k[i%k.length];return new TextDecoder("utf-8").decode(a);}
function esc(s){return String(s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function posCls(p){return p<=0?'p4':p<=3?'p1':p<=10?'p2':p<=20?'p3':'p4';}
function money(n){return '$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0});}
function render(d){
  var k=d.kpi;
  var kpis=[
   ['rev','Revenue',money(k.revenue),(k.sales+' sales · $'+k.epc+' EPC')],
   ['sale','Sales',k.sales,(k.cvr+'% CVR')],
   ['','Affiliate clicks',k.ef_clicks,''],
   ['','Impressions',Number(k.impressions).toLocaleString('en-US'),(k.gsc_clicks+' clicks')],
   ['','Avg position',(k.pos||'—'),'Search Console ('+d.win+'d)']
  ].map(function(x){return '<div class="kpi '+x[0]+'"><div class="l">'+x[1]+'</div><div class="v">'+x[2]+'</div><div class="s">'+x[3]+'</div></div>';}).join('');

  var sales = d.sales.length ? '<table><thead><tr><th>When</th><th>Country</th><th>Device</th><th style="text-align:right">Payout</th></tr></thead><tbody>'+
    d.sales.map(function(s){return '<tr><td>'+esc(s.date)+'</td><td>'+s.flag+' '+esc(s.cc)+'</td><td>'+esc(s.device)+'</td><td class="usd" style="text-align:right">'+money(s.usd)+'</td></tr>';}).join('')+'</tbody></table>'
    : '<div class="empty">No conversions recorded in the window yet.</div>';

  var geos=d.geos.map(function(g){
    var rows=g.queries.length? g.queries.map(function(q){
      return '<tr><td class="q" title="'+esc(q.q)+'">'+esc(q.q)+'</td><td style="text-align:center"><span class="pos '+posCls(q.position)+'">'+(q.position||'—')+'</span></td><td class="num">'+q.impressions+'</td><td class="num">'+q.clicks+'</td></tr>';
    }).join('') : '<tr><td colspan="4" class="empty">No ranking queries yet.</td></tr>';
    var rev = g.ef.revenue>0 ? money(g.ef.revenue) : '';
    return '<div class="geo"><div class="h"><div class="n"><span class="fl">'+g.flag+'</span>'+esc(g.name)+'</div><div class="rv">'+rev+'</div></div>'+
      '<div class="mini"><div>Avg pos<b>'+(g.gsc.position||'—')+'</b></div><div>Best<b>'+(g.gsc.best||'—')+'</b></div><div>Impr<b>'+g.gsc.impressions+'</b></div><div>Clicks<b>'+g.gsc.clicks+'</b></div><div>Sales<b>'+g.ef.conv+'</b></div></div>'+
      '<table><thead><tr><th>Query</th><th style="text-align:center">Pos</th><th class="num">Impr</th><th class="num">Clk</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }).join('');

  document.getElementById('app').innerHTML =
    '<div class="top"><h1><span class="b">O+</span>Ozem+ Command Center</h1><div class="meta"><span class="dot"></span>Updated '+esc(d.gen)+' · last '+d.win+' days</div></div>'+
    '<div class="grid kpis">'+kpis+'</div>'+
    '<h2>Recent sales</h2><div class="sales">'+sales+'</div>'+
    '<h2>Rankings &amp; sales by GEO</h2><div class="grid geos">'+geos+'</div>'+
    '<div class="foot">'+esc(d.note)+'</div>';
  requestAnimationFrame(function(){document.getElementById('app').classList.add('on');});
}
function tryUnlock(pc){
  try{var j=JSON.parse(deob(BLOB,pc));}catch(e){return false;}
  try{localStorage.setItem('oz_pc',pc);}catch(e){}
  document.getElementById('gate').style.display='none'; render(j); return true;
}
document.getElementById('go').onclick=function(){if(!tryUnlock(document.getElementById('pc').value)){document.getElementById('er').textContent='Wrong passcode';}};
document.getElementById('pc').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('go').click();});
(function(){try{var s=localStorage.getItem('oz_pc');if(s&&tryUnlock(s))return;}catch(e){}document.getElementById('pc').focus();})();
</script></body></html>
