<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Ozem+ · Command Center</title>
<style>
:root{
 --bg:#0d1315;--panel:#151e21;--panel2:#101819;--line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.12);
 --tx:#e9eff1;--dim:#93a4aa;--faint:#5f7178;--teal:#2ed4b0;--sky:#5fb0ff;--gold:#ecc06a;--green:#46e0a0;--amber:#f0b84a;--red:#f0736a}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--bg);color:var(--tx);font:15px/1.5 "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;
 background-image:radial-gradient(900px 460px at 50% -160px,rgba(46,212,176,.10),transparent 70%),radial-gradient(700px 400px at 100% 0,rgba(95,176,255,.06),transparent 60%);background-attachment:fixed}
.wrap{max-width:1120px;margin:0 auto;padding:22px 18px 70px}
.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
h1{font-size:19px;margin:0;font-weight:650;letter-spacing:.1px;display:flex;align-items:center;gap:9px}
.badge{background:linear-gradient(135deg,var(--teal),#1a9f86);color:#052b23;border-radius:8px;padding:3px 9px;font-size:14px;font-weight:800;box-shadow:0 3px 14px rgba(46,212,176,.28)}
.sub-h{color:var(--faint);font-weight:400;font-size:13px;margin-left:2px}
.ctrl{display:flex;align-items:center;gap:9px}
select{background:var(--panel);color:var(--tx);border:1px solid var(--line2);border-radius:10px;padding:9px 32px 9px 13px;font:600 14px/1 inherit;cursor:pointer;appearance:none;transition:.18s;
 background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='11' height='11' viewBox='0 0 11 11'><path d='M1 3l4.5 5L10 3' stroke='%2393a4aa' stroke-width='1.6' fill='none'/></svg>");background-repeat:no-repeat;background-position:right 12px center}
select:hover{border-color:var(--teal)}select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(46,212,176,.15)}
.rbtn{background:var(--panel);border:1px solid var(--line2);color:var(--dim);border-radius:10px;width:40px;height:39px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.18s}
.rbtn:hover{border-color:var(--teal);color:var(--teal);box-shadow:0 0 0 3px rgba(46,212,176,.13)}.rbtn:active{transform:scale(.94)}.rbtn.spin svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rule{height:1px;background:linear-gradient(90deg,transparent,var(--line2) 20%,var(--line2) 80%,transparent);margin:16px 0 4px}
.meta{color:var(--faint);font-size:12.5px;margin:8px 0 20px;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex:none;box-shadow:0 0 8px rgba(70,224,160,.8)}
.dot.live{animation:pulse 2.2s infinite}.dot.upd{background:var(--amber);box-shadow:0 0 8px rgba(240,184,74,.8);animation:blink .85s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(70,224,160,.5)}70%{box-shadow:0 0 0 8px rgba(70,224,160,0)}100%{box-shadow:0 0 0 0 rgba(70,224,160,0)}}
@keyframes blink{50%{opacity:.3}}
.grid{display:grid;gap:13px}
.kpis{grid-template-columns:repeat(5,1fr)}
@media(max-width:880px){.kpis{grid-template-columns:repeat(2,1fr)}}@media(max-width:520px){.kpis{grid-template-columns:1fr}}
.card{background:linear-gradient(180deg,rgba(255,255,255,.028),rgba(255,255,255,0)) ,var(--panel);border:1px solid var(--line);border-radius:15px;position:relative;overflow:hidden;transition:transform .22s cubic-bezier(.2,.7,.2,1),border-color .22s,box-shadow .22s}
.card:hover{transform:translateY(-3px);border-color:var(--line2);box-shadow:0 12px 30px rgba(0,0,0,.28)}
.kpi{padding:15px 17px}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),transparent 60%);opacity:.55}
.kpi.aff::before{background:linear-gradient(90deg,var(--sky),transparent 60%)}
.kpi.pos::before{background:linear-gradient(90deg,var(--green),transparent 60%)}
.kpi.geo::before{background:linear-gradient(90deg,var(--gold),transparent 65%);opacity:.4}
.kpi .l{color:var(--dim);font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.kpi .v{font-size:30px;font-weight:700;margin-top:6px;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1}
.kpi .s{color:var(--faint);font-size:12px;margin-top:5px}
.kpi.geo .l{margin-bottom:6px}
.glist{display:flex;flex-direction:column;gap:2px}
.grow{display:grid;grid-template-columns:18px 1fr auto auto;align-items:center;gap:7px;padding:4px 0;font-size:12.5px;border-top:1px solid rgba(255,255,255,.04)}
.grow:first-child{border-top:0}
.gf{font-size:14px}.gn{color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gv{font-weight:700;font-variant-numeric:tabular-nums;color:var(--tx)}
.gsale{background:rgba(236,192,106,.16);color:var(--gold);font-weight:700;font-size:10.5px;border-radius:5px;padding:1px 6px;margin-left:6px}
h2{font-size:12px;text-transform:uppercase;letter-spacing:.9px;color:var(--dim);margin:32px 0 12px;font-weight:700;display:flex;align-items:center;gap:10px}
h2::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--line2),transparent)}
.geos{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}
.geo{padding:16px 17px}
.geo .gh{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.geo .gh .n{font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:8px}.geo .gh .n .fl{font-size:19px}
.geo .gh .rv{color:var(--gold);font-weight:700;font-size:14px;background:rgba(236,192,106,.1);padding:3px 9px;border-radius:8px}
.mini{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:0 0 14px}
.mini div{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.mini .ml{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px}
.mini b{display:block;color:var(--tx);font-size:17px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
.mini b.sale{color:var(--green)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:6px 5px;border-bottom:1px solid rgba(255,255,255,.045)}tr:last-child td{border-bottom:0}
th{color:var(--faint);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px}
td.q{color:var(--tx);max-width:158px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.num{text-align:right;color:var(--dim);font-variant-numeric:tabular-nums}
tbody tr{transition:background .15s}tbody tr:hover td{background:rgba(255,255,255,.02)}
.pos{display:inline-block;min-width:32px;text-align:center;border-radius:6px;padding:2px 7px;font-weight:700;font-size:12px}
.p1{background:rgba(70,224,160,.16);color:var(--green)}.p2{background:rgba(46,212,176,.14);color:var(--teal)}.p3{background:rgba(240,184,74,.15);color:var(--amber)}.p4{background:rgba(255,255,255,.06);color:var(--dim)}
.sales-tbl{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:6px 17px 10px;overflow:hidden}
.usd{color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums}
.empty{color:var(--faint);font-size:13px;padding:14px 4px;text-align:center}
.foot{color:var(--faint);font-size:12px;margin-top:28px;border-top:1px solid var(--line);padding-top:13px}
.rev{opacity:0;animation:rise .52s cubic-bezier(.2,.75,.25,1) forwards}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
#app{transition:opacity .3s ease,filter .3s ease}#app.load{opacity:.45;filter:blur(2px)}
.sk{background:linear-gradient(90deg,#172023 25%,#212c30 37%,#172023 63%);background-size:400% 100%;animation:sh 1.25s ease infinite;border-radius:15px}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
.err{background:rgba(240,115,106,.1);border:1px solid rgba(240,115,106,.3);color:#f4a59e;border-radius:12px;padding:13px 15px;font-size:13px;margin:10px 0}
.gate{position:fixed;inset:0;background:var(--bg);background-image:radial-gradient(700px 400px at 50% 30%,rgba(46,212,176,.1),transparent 70%);display:flex;align-items:center;justify-content:center;z-index:9}
.gate .g{background:var(--panel);border:1px solid var(--line2);border-radius:18px;padding:30px 28px;width:min(350px,90vw);text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.45);animation:rise .5s cubic-bezier(.2,.75,.25,1)}
.gate .badge{font-size:20px;padding:6px 12px;display:inline-block;margin-bottom:12px}
.gate h3{margin:0 0 5px;font-size:17px;font-weight:650}.gate p{color:var(--dim);font-size:13px;margin:0 0 16px}
.gate input{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;color:var(--tx);padding:12px;font-size:15px;text-align:center;letter-spacing:.5px;transition:.18s}
.gate input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(46,212,176,.15)}
.gate button{margin-top:12px;width:100%;background:linear-gradient(135deg,var(--teal),#1c9f86);color:#052b23;border:0;border-radius:11px;padding:12px;font-weight:750;font-size:14.5px;cursor:pointer;transition:.15s}
.gate button:hover{filter:brightness(1.07)}.gate button:active{transform:scale(.98)}
.gate .er{color:var(--red);font-size:12.5px;height:15px;margin-top:9px}
</style></head><body>
<div class="gate" id="gate"><div class="g">
  <span class="badge">O+</span>
  <h3>Ozem+ Command Center</h3><p>Enter passcode to continue</p>
  <input id="pc" type="password" autocomplete="off" placeholder="passcode" autofocus>
  <div class="er" id="er"></div>
  <button id="go">Unlock →</button>
</div></div>
<div class="wrap">
  <div class="top">
    <h1><span class="badge">O+</span>Ozem+ <span class="sub-h">Command Center</span></h1>
    <div class="ctrl">
      <select id="range">
        <option value="today">Today</option><option value="yesterday">Yesterday</option>
        <option value="7d">Last 7 days</option><option value="14d">Last 14 days</option>
        <option value="month">This month</option><option value="lastmonth">Last month</option>
        <option value="year">This year</option>
      </select>
      <button class="rbtn" id="refresh" title="Refresh now"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13.6 8a5.6 5.6 0 1 1-1.7-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M13.5 1.5V5H10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
  </div>
  <div class="meta" id="meta"><span class="dot live"></span>Loading…</div>
  <div id="app"></div>
</div>
<script>
var WORKER="https://oz-data.jetterix.workers.dev/";
var PC=null, RANGE=(function(){try{return localStorage.getItem("oz_range")||"today"}catch(e){return "today"}})();
var timer=null;
function esc(s){return String(s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function posCls(p){return p<=0?'p4':p<=3?'p1':p<=10?'p2':p<=20?'p3':'p4';}
function nfmt(n){return Number(n).toLocaleString('en-US');}
function money(n){return '$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0});}
function skeleton(){
  var b='';for(var i=0;i<5;i++)b+='<div class="sk" style="height:96px"></div>';
  document.getElementById('app').innerHTML='<div class="grid kpis">'+b+'</div><h2>&nbsp;</h2><div class="sk" style="height:130px"></div><h2>&nbsp;</h2><div class="grid geos"><div class="sk" style="height:250px"></div><div class="sk" style="height:250px"></div></div>';
}
function kpi(cls,label,val,dec,sub){
  return '<div class="kpi card '+cls+' rev"><div class="l">'+label+'</div><div class="v" data-count="'+val+'" data-dec="'+(dec||0)+'">'+(dec?Number(val).toFixed(dec):'0')+'</div><div class="s">'+sub+'</div></div>';
}
function render(d){
  var k=d.kpi;
  var geoMini=d.geos.map(function(g){
    var sale=g.ef.conv>0?'<span class="gsale">'+g.ef.conv+' sale'+(g.ef.conv>1?'s':'')+'</span>':'<span></span>';
    return '<div class="grow"><span class="gf">'+g.flag+'</span><span class="gn">'+esc(g.name)+'</span><span class="gv" data-count="'+(g.ef.uclicks||0)+'">0</span>'+sale+'</div>';
  }).join('');
  var kpis=
    kpi('gsc','Search clicks',k.gsc_clicks,0,'from Google')+
    kpi('aff','Affiliate clicks',k.ef_uclicks,0,'unique')+
    '<div class="kpi card geo rev"><div class="l">By region · aff. clicks</div><div class="glist">'+geoMini+'</div></div>'+
    kpi('imp','Impressions',k.impressions,0,'Search Console')+
    kpi('pos','Avg position',k.pos||0,1,'lower is better');
  var sales=d.sales.length?'<div class="sales-tbl rev"><table><thead><tr><th>When</th><th>Country</th><th>Device</th><th style="text-align:right">Payout</th></tr></thead><tbody>'+
    d.sales.map(function(s){return '<tr><td>'+esc(s.date)+'</td><td>'+s.flag+' '+esc(s.cc)+'</td><td>'+esc(s.device)+'</td><td class="usd" style="text-align:right">'+money(s.usd)+'</td></tr>';}).join('')+'</tbody></table></div>'
    :'<div class="sales-tbl rev"><div class="empty">No conversions in this period.</div></div>';
  var geos=d.geos.map(function(g){
    var rows=g.queries.length?g.queries.map(function(q){return '<tr><td class="q" title="'+esc(q.q)+'">'+esc(q.q)+'</td><td style="text-align:center"><span class="pos '+posCls(q.position)+'">'+(q.position||'—')+'</span></td><td class="num">'+nfmt(q.impressions)+'</td><td class="num">'+q.clicks+'</td></tr>';}).join('')
      :'<tr><td colspan="4" class="empty">No ranking queries in this period.</td></tr>';
    var rev=g.ef.revenue>0?'<div class="rv">'+money(g.ef.revenue)+'</div>':'';
    return '<div class="geo card rev"><div class="gh"><div class="n"><span class="fl">'+g.flag+'</span>'+esc(g.name)+'</div>'+rev+'</div>'+
      '<div class="mini">'+
        '<div><div class="ml">Clicks</div><b data-count="'+g.gsc.clicks+'">0</b></div>'+
        '<div><div class="ml">Impr</div><b data-count="'+g.gsc.impressions+'">0</b></div>'+
        '<div><div class="ml">Avg pos</div><b data-count="'+(g.gsc.position||0)+'" data-dec="1">0</b></div>'+
        '<div><div class="ml">Sales</div><b class="sale" data-count="'+g.ef.conv+'">0</b></div>'+
      '</div>'+
      '<table><thead><tr><th>Query</th><th style="text-align:center">Pos</th><th class="num">Impr</th><th class="num">Clk</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }).join('');
  document.getElementById('app').innerHTML='<div class="grid kpis">'+kpis+'</div><h2>Recent sales</h2>'+sales+'<h2>Rankings &amp; sales by region</h2><div class="grid geos">'+geos+'</div><div class="foot">'+esc(d.note||'')+'</div>';
  stagger(); countUp();
}
function stagger(){var els=document.querySelectorAll('#app .rev');for(var i=0;i<els.length;i++)els[i].style.animationDelay=(i*55)+'ms';}
function countUp(){
  document.querySelectorAll('#app [data-count]').forEach(function(el){
    var to=parseFloat(el.getAttribute('data-count'))||0, dec=parseInt(el.getAttribute('data-dec')||'0',10);
    if(to===0){el.textContent=dec?to.toFixed(dec):'0';return;}
    var start=null,dur=780;
    function tick(ts){ if(start===null)start=ts; var t=Math.min(1,(ts-start)/dur), e=1-Math.pow(1-t,3), v=to*e;
      el.textContent=dec?v.toFixed(dec):nfmt(Math.round(v)); if(t<1)requestAnimationFrame(tick); else el.textContent=dec?to.toFixed(dec):nfmt(Math.round(to)); }
    requestAnimationFrame(tick);
  });
}
function setMeta(txt,updating){document.getElementById('meta').innerHTML='<span class="dot '+(updating?'upd':'live')+'"></span>'+txt;}
function fetchData(force){
  var app=document.getElementById('app'); app.classList.add('load');
  var rb=document.getElementById('refresh'); if(force)rb.classList.add('spin');
  setMeta('Updating…',true);
  fetch(WORKER+'?k='+encodeURIComponent(PC)+'&range='+encodeURIComponent(RANGE)+(force?'&force=1':'')+'&_='+Date.now())
   .then(function(r){if(r.status===401){throw {u:1};}return r.json();})
   .then(function(d){
     if(d.error)throw d;
     try{localStorage.setItem('oz_d2_'+RANGE,JSON.stringify(d));}catch(e){}
     render(d); app.classList.remove('load'); rb.classList.remove('spin');
     setMeta('Updated '+esc(d.gen)+' · '+esc(d.win)+' · auto-refresh 30m',false);
   })
   .catch(function(e){
     app.classList.remove('load'); rb.classList.remove('spin');
     if(e&&e.u){needPass(true);return;}
     setMeta('Update failed — showing last data. Retry with the ⟳ button.',false);
     if(!document.querySelector('#app .kpi'))document.getElementById('app').innerHTML='<div class="err">Could not load data: '+esc((e&&e.error)||'network error')+'</div>';
   });
}
function load(){
  try{var c=localStorage.getItem('oz_d2_'+RANGE);if(c){render(JSON.parse(c));}else{skeleton();}}catch(e){skeleton();}
  fetchData(false);
  if(timer)clearInterval(timer);
  timer=setInterval(function(){fetchData(true);},1800000);
}
function needPass(wrong){
  document.getElementById('gate').style.display='flex';
  if(wrong){document.getElementById('er').textContent='Wrong passcode';var i=document.getElementById('pc');i.value='';i.focus();}
}
function unlock(){
  var v=document.getElementById('pc').value.trim(); if(!v)return;
  PC=v; try{localStorage.setItem('oz_pc',v);}catch(e){}
  document.getElementById('gate').style.display='none'; document.getElementById('er').textContent=''; load();
}
document.getElementById('go').onclick=unlock;
document.getElementById('pc').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
document.getElementById('range').addEventListener('change',function(e){RANGE=e.target.value;try{localStorage.setItem('oz_range',RANGE);}catch(x){}load();});
document.getElementById('refresh').onclick=function(){fetchData(true);};
(function(){
  document.getElementById('range').value=RANGE;
  var s=null; try{s=localStorage.getItem('oz_pc');}catch(e){}
  if(s){PC=s;document.getElementById('gate').style.display='none';load();}else{document.getElementById('pc').focus();}
})();
</script></body></html>
